kind = "web"
previewPath = "/"
title = "Tahir AI Writer"
version = "1.0.0"
id = "artifacts/tahir-ai-writer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18445

[services.development]
run = "pnpm --filter @workspace/tahir-ai-writer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tahir-ai-writer", "run", "build" ]
publicDir = "artifacts/tahir-ai-writer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18445"
BASE_PATH = "/"
